  <h1>黑暗料理</h1 >

<p>这是一份黑暗料理食谱</p>

<p>这是一份黑暗料理的炸土豆，可以清洁肠胃使身体更健康。</p>

<h2>Ingredients</h2>

<ul>

  <li>土豆： 40%</li>

<li>植物油： 25%</li>

<li>辣椒： 15%</li>

<li>盐： 3%</li>

<li>花椒： 5%</li>

</ul>

<h2>Instructions</h2>

<ol>

<li>将土豆削皮切块洗净</li>

<li>将辣椒、花椒、盐放在一起搅拌均匀做蘸料。</li>

<li>将植物油放平底锅里面使用电磁炉或者燃气灶加热，</li>

<li>将植物油加热到一定温度后加入土豆，</li>

<li>当土豆炸的焦黄后关火起锅。</li>

<li>炸土豆要蹭热吃最佳</li>
</ol>
